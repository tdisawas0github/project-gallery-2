# DigitalOcean App Platform spec
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Before deploying:
#   1. Push this repo to GitHub
#   2. Replace YOUR_GITHUB_USER/project-gallery-2 with your repo
#   3. Run: doctl apps create --spec .do/app.yaml
#      Or connect the repo in the DigitalOcean control panel

name: llm-gateway
region: sgp

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

ingress:
  rules:
    - component:
        name: frontend
      match:
        path:
          prefix: /
    - component:
        name: backend
      match:
        path:
          prefix: /api

services:
  - name: backend
    git:
      repo_clone_url: https://github.com/tdisawas0github/project-gallery-2.git
      branch: main
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 15
      period_seconds: 10
      timeout_seconds: 5
    envs:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${llm-gateway-db.DATABASE_URL}
static_sites:
  - name: frontend
    git:
      repo_clone_url: https://github.com/tdisawas0github/project-gallery-2.git
      branch: main
    build_command: npm ci && npm run build
    output_dir: dist
    source_dir: frontend
    environment_slug: node-js
    catchall_document: index.html
    index_document: index.html

databases:
  - name: llm-gateway-db
    engine: PG
    version: "16"
    production: false
